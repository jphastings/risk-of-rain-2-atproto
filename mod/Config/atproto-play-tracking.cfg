## You can edit Handle and AppPassword here BEFORE launching the game for the first
## time. BepInEx reads this file on first launch and tidies up the formatting.

[Login]

## Your atproto handle, e.g. you.bsky.social (or a did:plc:…). Leave blank to disable publishing.
# Setting type: String
# Default value:
