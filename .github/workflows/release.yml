name: Release

on:
  push:
    branches: [main]
    paths: ['mod/ByJP.Ror2.Play.csproj'] # release when the mod <Version> changes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Extract mod version
        id: ver
        run: |
          version=$(grep -oP '<Version>\K[^<]+' mod/ByJP.Ror2.Play.csproj)
          if [[ -z "$version" ]]; then echo "no <Version> in mod/ByJP.Ror2.Play.csproj" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"

      - name: Skip if the tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | grep -q .; then
            echo "tag ${{ steps.ver.outputs.tag }} exists — nothing to release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.0.x'

      # ByJP.AtprotoGaming.Core restores from nuget.org; the publicised RoR2/Unity/BepInEx
      # come from the BepInEx feed via -p:UseGameLibs=true — no game install needed.
      - name: Build the mod
        if: steps.check.outputs.skip != 'true'
        run: |
          dotnet build mod/ByJP.Ror2.Play.csproj -c Release -p:UseGameLibs=true \
            /p:SigningPrivateKey="${{ secrets.MOD_SIGNING_PRIVATE_KEY }}"

      - name: Stage the release zip
        if: steps.check.outputs.skip != 'true'
        run: |
          stage="release/ByJP.Ror2.Play"
          mkdir -p "$stage"
          cp mod/bin/Release/*.dll "$stage/"
          cp mod/manifest.json     "$stage/"
          cp README.md             "$stage/"
          ( cd release && zip -r "ByJP_Ror2_atproto_Play_${{ steps.ver.outputs.version }}.zip" ByJP.Ror2.Play )

      - name: Create the release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "ByJP RoR2 atproto Play ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            "release/ByJP_Ror2_atproto_Play_${{ steps.ver.outputs.version }}.zip"
