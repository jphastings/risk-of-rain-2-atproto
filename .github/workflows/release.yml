name: Release

on:
  push:
    branches: [main]
    paths: ['mod/ByJP.Ror2.Play.csproj'] # release when the mod <Version> changes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Extract mod version
        id: ver
        run: |
          version=$(grep -oP '<Version>\K[^<]+' mod/ByJP.Ror2.Play.csproj)
          if [[ -z "$version" ]]; then echo "no <Version> in mod/ByJP.Ror2.Play.csproj" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"

      - name: Skip if the tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | grep -q .; then
            echo "tag ${{ steps.ver.outputs.tag }} exists — nothing to release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '9.0.x'

      # ByJP.AtprotoGaming.Core restores from nuget.org; the publicised RoR2/Unity/BepInEx
      # come from the BepInEx feed via -p:UseGameLibs=true — no game install needed.
      - name: Build the mod
        if: steps.check.outputs.skip != 'true'
        run: |
          dotnet build mod/ByJP.Ror2.Play.csproj -c Release -p:UseGameLibs=true \
            /p:SigningPrivateKey="${{ secrets.MOD_SIGNING_PRIVATE_KEY }}"

      - name: Stage the release zip
        if: steps.check.outputs.skip != 'true'
        run: |
          stage="release/AtprotoPlayTracking"
          mkdir -p "$stage"
          cp mod/bin/Release/*.dll "$stage/"
          cp mod/manifest.json     "$stage/"
          cp README.md             "$stage/"
          ( cd release && zip -r "Atproto_Play_Tracking_${{ steps.ver.outputs.version }}.zip" AtprotoPlayTracking )

      - name: Create the release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Atproto Play Tracking ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            "release/Atproto_Play_Tracking_${{ steps.ver.outputs.version }}.zip"

      # --- Thunderstore (optional). Inert until you set the THUNDERSTORE_TEAM variable
      #     and the THUNDERSTORE_TOKEN secret; swap icon.png for real 256x256 art. The
      #     action builds the manifest from these inputs + root icon.png + root README.md. ---
      - name: Stage the Thunderstore package files
        if: steps.check.outputs.skip != 'true' && vars.THUNDERSTORE_TEAM != ''
        run: |
          mkdir -p tspkg
          cp mod/bin/Release/*.dll tspkg/

      - name: Publish to Thunderstore
        if: steps.check.outputs.skip != 'true' && vars.THUNDERSTORE_TEAM != ''
        uses: GreenTF/upload-thunderstore-package@aef20d7e07a0858d0decae64872aa5526662ab8d # v4.3
        with:
          namespace: ${{ vars.THUNDERSTORE_TEAM }}
          community: riskofrain2
          name: Atproto_Play_Tracking
          description: Publishes your Risk of Rain 2 runs to your atproto PDS as games.gamesgamesgamesgames.actor.play records.
          version: ${{ steps.ver.outputs.version }}
          repo: thunderstore.io
          path: tspkg
          deps: bbepis-BepInExPack@5.4.2121
          website: https://github.com/jphastings/risk-of-rain-2-atproto
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
